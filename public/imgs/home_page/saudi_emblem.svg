<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="#333">
  <!-- Simplified Saudi Emblem (Palm tree with crossed swords) -->
  <!-- Palm tree trunk -->
  <rect x="47" y="20" width="6" height="40" rx="2" fill="#333"/>
  <!-- Palm leaves -->
  <ellipse cx="50" cy="18" rx="18" ry="10" fill="#2d5a27"/>
  <ellipse cx="38" cy="22" rx="12" ry="6" fill="#2d5a27" transform="rotate(-20 38 22)"/>
  <ellipse cx="62" cy="22" rx="12" ry="6" fill="#2d5a27" transform="rotate(20 62 22)"/>
  <ellipse cx="34" cy="28" rx="10" ry="5" fill="#2d5a27" transform="rotate(-35 34 28)"/>
  <ellipse cx="66" cy="28" rx="10" ry="5" fill="#2d5a27" transform="rotate(35 66 28)"/>
  <!-- Left sword -->
  <line x1="25" y1="75" x2="50" y2="25" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23" y1="73" x2="27" y2="77" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Right sword -->
  <line x1="75" y1="75" x2="50" y2="25" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="73" y1="77" x2="77" y2="73" stroke="#333" stroke-width="2" stroke-linecap="round"/>
</svg>
